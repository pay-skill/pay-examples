# Zero-code x402 paywall: pay-gate sidecar + your origin.
# No code changes to your API — just add this docker-compose.

services:
  origin:
    build: ../../origin
    expose: ["3000"]

  gate:
    image: ghcr.io/pay-skill/gate:latest
    ports: ["8402:8402"]
    volumes: ["./pay-gate.yaml:/etc/pay-gate/pay-gate.yaml:ro"]
    environment:
      PROVIDER_ADDRESS: "${PROVIDER_ADDRESS}"
    command: ["start", "--config", "/etc/pay-gate/pay-gate.yaml"]
    depends_on: [origin]
