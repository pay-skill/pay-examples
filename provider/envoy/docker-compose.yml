services:
  origin:
    build: ../../origin
    expose: ["3000"]

  gate:
    image: ghcr.io/pay-skill/gate:latest
    expose: ["8402"]
    volumes: ["./pay-gate.yaml:/etc/pay-gate/pay-gate.yaml:ro"]
    environment:
      PROVIDER_ADDRESS: "${PROVIDER_ADDRESS}"
    command: ["start", "--config", "/etc/pay-gate/pay-gate.yaml"]
    depends_on: [origin]

  envoy:
    image: envoyproxy/envoy:v1.31-latest
    ports: ["80:80"]
    volumes: ["./envoy.yaml:/etc/envoy/envoy.yaml:ro"]
    depends_on: [gate]
