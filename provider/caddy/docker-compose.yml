services:
  origin:
    build: ../../origin
    expose: ["3000"]

  gate:
    image: ghcr.io/pay-skill/gate:latest
    expose: ["8402"]
    volumes: ["./pay-gate.yaml:/etc/pay-gate/pay-gate.yaml:ro"]
    environment:
      PROVIDER_ADDRESS: "${PROVIDER_ADDRESS}"
    command: ["start", "--config", "/etc/pay-gate/pay-gate.yaml"]
    depends_on: [origin]

  caddy:
    image: caddy:2-alpine
    ports: ["80:80"]
    volumes: ["./Caddyfile:/etc/caddy/Caddyfile:ro"]
    depends_on: [gate]
