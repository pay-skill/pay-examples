services:
  origin:
    build: ../../origin
    expose: ["3000"]

  gate:
    image: ghcr.io/pay-skill/gate:latest
    ports: ["8402:8402"]
    volumes: ["./pay-gate.yaml:/etc/pay-gate/pay-gate.yaml:ro"]
    environment:
      PROVIDER_ADDRESS: "${PROVIDER_ADDRESS}"
    command: ["pay-gate", "start", "--config", "/etc/pay-gate/pay-gate.yaml", "--port", "8402"]
    depends_on: [origin]
