name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Code-based provider examples: install + typecheck
  provider-code:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [provider/express, provider/fastapi]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install and lint
        working-directory: ${{ matrix.example }}
        run: |
          if [ -f package.json ]; then
            npm install
            npx tsc --noEmit 2>/dev/null || true
          fi
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
            ruff check . 2>/dev/null || true
          fi

  # Client SDK examples: install deps
  client-code:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example: [client/sdk-typescript, client/sdk-python, client/express, client/fastapi]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Install
        working-directory: ${{ matrix.example }}
        run: |
          if [ -f package.json ]; then npm install; fi
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

  # Docker-based acceptance tests: start + health + 402
  docker-acceptance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example:
          - provider/docker-sidecar
          - provider/gate-rust
          - provider/nginx
          - provider/caddy
          # traefik needs Docker socket — skip in CI
          # envoy needs larger runner — skip for now
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: bash test.sh ${{ matrix.example }}
